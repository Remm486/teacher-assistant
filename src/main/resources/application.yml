server:
  port: 10001

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/teacher_assistant?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
    username: root
    password: Root@123456
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis:
  type-aliases-package: com.assistant.model
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ==================== AI 大模型配置 ====================
# 支持 OpenAI 兼容格式的任意服务（如阿里云百炼、DeepSeek、OpenAI 等）
# 请将下方占位符替换为真实值后即可使用
ai:
  api:
    url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions    # 阿里云百炼地址（可替换为其他 OpenAI 兼容地址）
    key: YOUR_API_KEY_HERE                                                      # 替换为真实 API Key
    model: qwen-plus                                                            # 模型名称（如 qwen-plus、gpt-4o、deepseek-chat）

# ==================== 小米 MiMo 大模型配置 ====================
xiaomi:
  mimo:
    api-key: "sk-c1hhsuic3kp3zsdn91zzokb8earxowvfzrtoh7xuvy2o3h9j"
    url: "https://api.xiaomimimo.com/v1/chat/completions"
    model: "mimo-v2-flash"
